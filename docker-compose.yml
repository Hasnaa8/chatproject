version: '3.8'

services:
  db:
    image: postgres:18-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=chat_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=123456789
  redis:
    image: redis:7.0.11-alpine
    ports:
      - "6379:6379"

  django:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
      - ./media:/app/media
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - db
    links:
      - redis
  worker:
    build: .
    command: celery -A chatproject worker -l info -P eventlet
    volumes:
      - .:/app
    depends_on:
      - redis
      - db
    links:
      - redis
volumes:
  postgres_data: